<div class="max-w-3xl mx-auto bg-white text-gray-800 rounded-2xl shadow-xl p-6 md:p-8">
<form
  class="estimate-form"
  action="https://formsubmit.co/michael@tameyourterrain.com"
  method="POST"
>

  <input type="hidden" name="_subject" value="New Lead - Tame Your Terrain Website">
  <input type="hidden" name="_captcha" value="true">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://www.tameyourterrain.com/buckthorn-removal-hunting-property.html">
  <input type="hidden" name="_autoresponse" value="Thank you for contacting Tame Your Terrain. We received your estimate request and will get back to you as soon as possible. If you need immediate help, call or text 715-255-0328.">
  <input type="text" name="_honey" style="display:none">

  <div class="form-row">
    <label for="name">Name <span style="color:red;">*</span></label>
    <input type="text" id="name" name="Name" maxlength="80" required>
  </div>

  <div class="form-row">
    <label for="propertyAddress">Property Address <span style="color:red;">*</span></label>
    <input type="text" id="propertyAddress" name="Property Address" maxlength="160" required>
    <div class="help-text">Street address, nearest road, or best address for the property location.</div>
  </div>

  <div class="grid md:grid-cols-2 gap-4">
    <div class="form-row">
      <label for="email">Email <span style="color:red;">*</span></label>
      <input type="email" id="email" name="email" maxlength="100" required>
    </div>

    <div class="form-row">
      <label for="phone">Phone <span style="color:red;">*</span></label>
      <input type="tel" id="phone" name="Phone" maxlength="30" required>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4">
    <div class="form-row">
      <label for="serviceType">Service Type <span style="color:red;">*</span></label>
      <select id="serviceType" name="Service Type" required>
        <option value="">- Select a service -</option>
        <option value="Forestry Mulching">Forestry Mulching</option>
        <option value="Trail Building">Trail Building</option>
        <option value="Land Clearing">Land Clearing</option>
        <option value="Buckthorn Removal" selected>Buckthorn Removal</option>
        <option value="Food Plot Clearing">Food Plot Clearing</option>
        <option value="Habitat Improvement">Habitat Improvement</option>
        <option value="Brush Removal">Brush Removal</option>
      </select>
    </div>

    <div class="form-row">
      <label for="propertySize">Estimated Property Size</label>
      <select id="propertySize" name="Estimated Property Size">
        <option value="">- Select size -</option>
        <option value="1 - 5 acres">1 - 5 acres</option>
        <option value="5 - 10 acres">5 - 10 acres</option>
        <option value="10 - 20 acres">10 - 20 acres</option>
        <option value="20+ acres">20+ acres</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <label for="projectDescription">Project Description</label>
    <textarea id="projectDescription" name="Project Description" placeholder="Tell us what you want done, what the land looks like now, and anything important about access or timing."></textarea>
  </div>

  <div class="form-row">
    <label for="bestTimeToContact">Best Time to Contact You</label>
    <input type="text" id="bestTimeToContact" name="Best Time To Contact" maxlength="80" placeholder="Example: weekday afternoons or anytime after 5 pm">
  </div>

  <div class="button-row">
    <button type="submit">Request My Free Estimate</button>
    <input type="reset" value="Reset">
  </div>

</form>
</div>
